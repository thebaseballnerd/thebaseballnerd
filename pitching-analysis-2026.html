const p=PITCHER_DATA.filter(x=>x.ip>=10);
const topERA=[...p].sort((a,b)=>a.era-b.era).slice(0,5);
const topWAR=[...p].sort((a,b)=>b.war-a.war).slice(0,5);
const topKBB=[...p].filter(x=>x.kbb>0).sort((a,b)=>b.kbb-a.kbb).slice(0,5);
const unlucky=[...p].filter(x=>x.xERA>0).sort((a,b)=>(b.era-b.xERA)-(a.era-a.xERA)).slice(0,5);
const soft=[...p].filter(x=>x.hardHit>0).sort((a,b)=>a.hardHit-b.hardHit).slice(0,5);

function s(t,d,k,l,m){
return`<div class="section"><div class="section-title">${t}</div>${d.map((x,i)=>`
<div class="player-row">
<div class="player-left">
<div class="player-rank">${i+1}</div>
<div><div class="player-name">${x.name}</div><div class="player-team">${x.team}</div></div>
</div>
<div style="text-align:right">
<div class="player-stat">${x[k].toFixed(2)} ${l}</div>
<div class="player-meta">${m(x)}</div>
</div>
</div>`).join('')}</div>`;
}

app.innerHTML=`
${s('Top 5 by ERA',topERA,'era','ERA',x=>`${x.ip.toFixed(1)} IP`)}
${s('Top 5 by WAR',topWAR,'war','WAR',x=>`${x.era.toFixed(2)} ERA, ${x.ip.toFixed(1)} IP`)}
<div class="grid-2">
${s('Best K/BB Ratios',topKBB,'kbb','K/BB',x=>`${x.kpct.toFixed(1)}% K%, ${x.bbpct.toFixed(1)}% BB%`)}
${s('Most Unlucky (ERA vs xERA)',unlucky,'era','ERA',x=>`${x.xERA.toFixed(2)} xERA (+${(x.era-x.xERA).toFixed(2)})`)}
</div>
${s('Lowest Hard Hit%',soft,'hardHit','% Hard',x=>`${x.barrel.toFixed(1)}% Barrel`)}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAGER Leaders 2026</title>
    <style>
        body { margin:0; padding:15px 10px; font-family: Arial, Helvetica, sans-serif; background:#fff; }
        h1 { margin:0 0 8px 0; font-size:26px; text-align:center; color:#1a1a1a; font-weight:700; }
        .subtitle { text-align:center; color:#444; font-size:15px; margin:0 0 20px 0; }
        table { width:100%; border-collapse:collapse; font-size:15.5px; }
        th, td { padding:12px 8px; border-bottom:1px solid #e5e5e5; }
        th { 
            background:#1f2a44; 
            color: white;           /* This makes "SEAGER" white on dark background */
            font-weight:600; 
        }
        tr:nth-child(even) { background:#f8f9fa; }
        .rank { text-align:center; font-weight:bold; width:50px; }
        .player { font-weight:bold; }
        .seager { 
            text-align:center; 
            font-weight:bold; 
            color:#1f2a44;     /* Dark blue for the numbers */
            font-size:17px; 
        }
        .center { text-align:center; }
        .caption { text-align:center; font-size:13px; color:#555; margin-top:18px; }
    </style>
</head>
<body>
    <div>
        <h1>SEAGER Leaders 2026</h1>
        <p class="subtitle">Top 10 Young MLB Hitters in Selective Aggression (as of April 10, 2026)</p>
        
        <table>
            <thead>
                <tr>
                    <th class="rank">Rank</th>
                    <th>Player</th>
                    <th class="center">Age</th>
                    <th class="center">Team</th>
                    <th class="seager">SEAGER</th>
                    <th class="center">Whiff%</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="rank">1</td>
                    <td class="player">Junior Caminero</td>
                    <td class="center">22</td>
                    <td class="center">TB</td>
                    <td class="seager">28.2</td>
                    <td class="center">26.9</td>
                </tr>
                <!-- Repeat the other 9 rows the same way -->
                <tr>
                    <td class="rank">2</td>
                    <td class="player">Nick Kurtz</td>
                    <td class="center">23</td>
                    <td class="center">SAC</td>
                    <td class="seager">25.0</td>
                    <td class="center">41.1</td>
                </tr>
                <!-- ... add the rest of the rows exactly as before ... -->
            </tbody>
        </table>
        
        <p class="caption">
            Data as of April 10, 2026 • Source: Baseball Prospectus
        </p>
    </div>
</body>
</html>

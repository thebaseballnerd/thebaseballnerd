<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0a1628;--navy-mid:#112040;--navy-light:#1a2f50;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f5f0e8;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem;background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(201,168,76,0.15);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.08em;color:var(--gold);text-decoration:none;}
.nav-logo span{color:var(--cream);opacity:0.45;}
.nav-links{display:flex;gap:0;list-style:none;}
.nav-links a{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.45;text-decoration:none;padding:0.4rem 0.9rem;display:block;transition:opacity 0.15s,color 0.15s;}
.nav-links a:hover{opacity:1;color:var(--gold);}
.nav-links a.active{opacity:1;color:var(--gold);border-bottom:1px solid var(--gold);}
.nav-cta{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.45rem 1rem;background:var(--gold);color:var(--navy);border:none;cursor:pointer;font-weight:500;text-decoration:none;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold-light);}
.article-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem 6rem;}
.back-link{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.6;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;margin-bottom:2rem;transition:opacity 0.15s;}
.back-link:hover{opacity:1;}
.article-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;}
.article-eyebrow::before{content:'';display:inline-block;width:1rem;height:1px;background:var(--gold);}
.article-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:0.03em;color:var(--cream);line-height:1;margin-bottom:1rem;}
.article-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:1rem 0;border-top:1px solid rgba(201,168,76,0.1);border-bottom:1px solid rgba(201,168,76,0.1);margin-bottom:2.5rem;}
.meta-item{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.45;}
.meta-result{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;}
.meta-result.win{background:rgba(90,204,106,0.1);color:#5acc6a;}
.meta-result.loss{background:rgba(204,90,90,0.1);color:#cc5a5a;}
.article-body p{font-family:'DM Serif Display',serif;font-size:1.15rem;line-height:1.85;color:var(--cream);opacity:0.85;margin-bottom:1.5rem;}
.article-body p:first-child{font-size:1.25rem;opacity:1;}
.article-nav{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(201,168,76,0.08);}
.article-nav a{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);opacity:0.6;text-decoration:none;transition:opacity 0.15s;max-width:40%;}
.article-nav a:hover{opacity:1;}
.not-found{text-align:center;padding:4rem 0;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.3;}
footer{background:#060e1a;padding:1.75rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;border-top:1px solid rgba(201,168,76,0.06);}
.foot-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.08em;color:var(--gold);}
.foot-logo span{color:var(--cream);opacity:0.3;}
.foot-copy{font-family:'IBM Plex Mono',monospace;font-size:0.57rem;letter-spacing:0.08em;color:var(--cream);opacity:0.18;text-transform:uppercase;}
.foot-links{display:flex;gap:1.25rem;list-style:none;}
.foot-links a{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.28;text-decoration:none;transition:opacity 0.2s;}
.foot-links a:hover{opacity:0.75;}
@media(max-width:700px){.nav-links{display:none;}.article-body p{font-size:1rem;}.article-nav a{max-width:100%;}}

<script src="recaps-data.js"></script>
<script>
function getParam(n){ return new URLSearchParams(window.location.search).get(n); }

function render(){
  var id     = getParam('id');
  var recap  = typeof RECAPS !== 'undefined' ? RECAPS.find(function(r){ return r.id === id; }) : null;
  var wrap   = document.getElementById('article-wrap');

  if(!recap){
    wrap.innerHTML = '<div class="not-found">Recap not found. <a href="recaps.html" style="color:var(--gold);">Back to recaps →</a></div>';
    return;
  }

  // Build matchup strings — support both old Rangers-only and new all-team format
  var away, home;
  if(recap.awayTeam && recap.homeTeam){
    away = recap.awayTeam;
    home = recap.homeTeam;
  } else {
    var focusTeam = recap.focusTeam || 'Texas Rangers';
    away = recap.home ? recap.opponent : focusTeam;
    home = recap.home ? focusTeam : recap.opponent;
  }
  var matchup    = away + ' at ' + home;
  var awayShort  = away.split(' ').pop();
  var homeShort  = home.split(' ').pop();
  var shortMatch = awayShort + ' at ' + homeShort;

  // Dynamic SEO — lead with pitcher names and matchup, not team branding
  document.title = matchup + ' Recap (' + recap.score + ') — The Baseball Nerd';
  document.querySelector('meta[name="description"]').setAttribute('content',
    recap.date + ' · ' + matchup + ' · ' + recap.score + '. ' + recap.preview.slice(0,140) + '. Analytics-first coverage on The Baseball Nerd.');
  document.querySelector('link[rel="canonical"]').setAttribute('href',
    'https://thebaseballnerd.com/recap.html?id=' + recap.id);
  document.querySelector('meta[property="og:title"]') ||
    document.head.insertAdjacentHTML('beforeend', '<meta property="og:title" content="' + matchup + ' Recap — The Baseball Nerd">');

  // Inject Article schema
  var schema = {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": matchup + ' Recap — ' + recap.date + ' (' + recap.score + ')',
    "description": recap.preview,
    "datePublished": recap.date,
    "author": {"@type":"Person","name":"Pete Dwyer"},
    "publisher": {"@type":"Organization","name":"The Baseball Nerd","url":"https://thebaseballnerd.com"},
    "url": "https://thebaseballnerd.com/recap.html?id=" + recap.id,
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type":"ListItem","position":1,"name":"The Baseball Nerd","item":"https://thebaseballnerd.com"},
        {"@type":"ListItem","position":2,"name":"MLB Recaps 2026","item":"https://thebaseballnerd.com/recaps.html"},
        {"@type":"ListItem","position":3,"name":matchup + ' — ' + recap.date,"item":"https://thebaseballnerd.com/recap.html?id=" + recap.id}
      ]
    }
  };
  var schemaTag = document.createElement('script');
  schemaTag.type = 'application/ld+json';
  schemaTag.textContent = JSON.stringify(schema);
  document.head.appendChild(schemaTag);

  // Prev / next navigation
  var idx  = RECAPS.findIndex(function(r){ return r.id === id; });
  var prev = RECAPS[idx + 1];
  var next = RECAPS[idx - 1];

  function navLabel(r){
    var a, h;
    if(r.awayTeam && r.homeTeam){ a = r.awayTeam; h = r.homeTeam; }
    else { var ft = r.focusTeam || 'Texas Rangers'; a = r.home ? r.opponent : ft; h = r.home ? ft : r.opponent; }
    return a.split(' ').pop() + ' at ' + h.split(' ').pop() + ' (' + r.date + ')';
  }

  var paragraphs = recap.body.split('\n\n').map(function(p){ return '<p>' + p + '</p>'; }).join('');

  wrap.innerHTML =
    '<a class="back-link" href="recaps.html">← All recaps</a>' +
    '<div class="article-eyebrow">Game Recap · 2026 MLB Season</div>' +
    '<h1 class="article-title">' + matchup + '</h1>' +
    '<div class="article-meta">' +
      '<div class="meta-item">' + recap.date + '</div>' +
      '<div class="meta-result ' + recap.result + '">' + (recap.result === 'win' ? 'W' : 'L') + ' · ' + recap.score + '</div>' +
      '<div class="meta-item">Pete Dwyer · The Baseball Nerd</div>' +
    '</div>' +
    '<div class="article-body">' + paragraphs + '</div>' +
    '<div class="article-nav">' +
      (prev ? '<a href="recap.html?id=' + prev.id + '">← ' + navLabel(prev) + '</a>' : '<span></span>') +
      '<a href="recaps.html" style="opacity:0.45;text-align:center;">All Recaps</a>' +
      (next ? '<a href="recap.html?id=' + next.id + '" style="text-align:right;">' + navLabel(next) + ' →</a>' : '<span></span>') +
    '</div>';
}

render();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0a1628;--navy-mid:#112040;--navy-light:#1a2f50;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f5f0e8;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2rem;background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(201,168,76,0.15);position:sticky;top:0;z-index:100;}

.nav-links a:hover{opacity:1;color:var(--gold);}
.nav-links a.active{opacity:1;color:var(--gold);border-bottom:1px solid var(--gold);}
.nav-cta{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.45rem 1rem;background:var(--gold);color:var(--navy);border:none;cursor:pointer;font-weight:500;text-decoration:none;transition:background 0.2s;}
.nav-cta:hover{background:var(--gold-light);}
.article-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem 6rem;}
.back-link{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.6;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;margin-bottom:2rem;transition:opacity 0.15s;}
.back-link:hover{opacity:1;}
.article-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;}
.article-eyebrow::before{content:'';display:inline-block;width:1rem;height:1px;background:var(--gold);}
.article-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:0.03em;color:var(--cream);line-height:1;margin-bottom:1rem;}
.article-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:1rem 0;border-top:1px solid rgba(201,168,76,0.1);border-bottom:1px solid rgba(201,168,76,0.1);margin-bottom:2.5rem;}
.meta-item{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.45;}
.meta-result{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;}
.meta-result.win{background:rgba(90,204,106,0.1);color:#5acc6a;}
.meta-result.loss{background:rgba(204,90,90,0.1);color:#cc5a5a;}
.article-body p{font-family:'DM Serif Display',serif;font-size:1.15rem;line-height:1.85;color:var(--cream);opacity:0.85;margin-bottom:1.5rem;}
.article-body p:first-child{font-size:1.25rem;opacity:1;}
/* MLB Stories embed */
.mlb-embed-wrap{margin:2.5rem 0;border:1px solid rgba(201,168,76,0.15);background:rgba(0,0,0,0.2);}
.mlb-embed-label{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);opacity:0.65;padding:0.65rem 1rem;border-bottom:1px solid rgba(201,168,76,0.1);display:flex;align-items:center;justify-content:space-between;}
.mlb-embed-label a{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.5;text-decoration:none;transition:opacity 0.15s;}
.mlb-embed-label a:hover{opacity:1;}
.mlb-embed-frame{width:100%;height:600px;border:none;display:block;}
@media(max-width:700px){.mlb-embed-frame{height:480px;}}
.article-nav{display:flex;justify-content:center;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(201,168,76,0.08);}
.article-nav a{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.6;text-decoration:none;transition:opacity 0.15s;}
.article-nav a:hover{opacity:1;}
.not-found{text-align:center;padding:4rem 0;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.3;}
footer{background:#060e1a;padding:1.75rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;border-top:1px solid rgba(201,168,76,0.06);}
.foot-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.08em;color:var(--gold);}
.foot-logo span{color:var(--cream);opacity:0.3;}
.foot-copy{font-family:'IBM Plex Mono',monospace;font-size:0.57rem;letter-spacing:0.08em;color:var(--cream);opacity:0.18;text-transform:uppercase;}
.foot-links{display:flex;gap:1.25rem;list-style:none;}
.foot-links a{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream);opacity:0.28;text-decoration:none;transition:opacity 0.2s;}
.foot-links a:hover{opacity:0.75;}
/* Noscript fallback — hidden when JS runs */
.noscript-content{display:none;}
@media(max-width:700px){.nav-links{display:none;}.article-body p{font-size:1rem;}}

<script src="recaps-data.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────
function getParam(name){return new URLSearchParams(window.location.search).get(name);}

// Convert id like "4-13-26-athletics" to ISO date "2026-04-13"
function idToISODate(id){
  // format: M-D-YY-opponent
  const parts = id.split('-');
  if(parts.length < 3) return null;
  const m = parts[0].padStart(2,'0');
  const d = parts[1].padStart(2,'0');
  const y = '20' + parts[2];
  return `${y}-${m}-${d}`;
}

function buildSlug(recap){
  // Canonical SEO slug from recap data
  const opp = recap.opponent.toLowerCase()
    .replace(/\s+/g,'-')
    .replace(/[^a-z0-9-]/g,'');
  return recap.id; // already slug-formatted
}

// ── Structured Data (JSON-LD) ─────────────────────────────────────────
function injectStructuredData(recap, matchupTitle, isoDate){
  const homeTeam = recap.home ? 'Texas Rangers' : recap.opponent;
  const awayTeam = recap.home ? recap.opponent : 'Texas Rangers';
  const texScore = recap.score.match(/TEX\s+(\d+)/)?.[1] || null;
  const oppScore = recap.score.match(/,\s*\w+\s+(\d+)/)?.[1] || null;

  const schema = {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": matchupTitle + ' Recap — ' + recap.date,
    "description": recap.preview,
    "datePublished": isoDate || new Date().toISOString().split('T')[0],
    "dateModified": isoDate || new Date().toISOString().split('T')[0],
    "author": {
      "@type": "Person",
      "name": "Pete Dwyer",
      "url": "https://thebaseballnerd.com/about.html"
    },
    "publisher": {
      "@type": "Organization",
      "name": "The Baseball Nerd",
      "url": "https://thebaseballnerd.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://thebaseballnerd.com/favicon.png"
      }
    },
    "url": "https://thebaseballnerd.com/recap.html?id=" + recap.id,
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "https://thebaseballnerd.com/recap.html?id=" + recap.id
    },
    "about": {
      "@type": "SportsEvent",
      "name": matchupTitle,
      "startDate": isoDate,
      "endDate": isoDate,
      "eventStatus": "https://schema.org/EventScheduled",
      "sport": "Baseball",
      "location": {
        "@type": "Place",
        "name": recap.home ? "Globe Life Field" : recap.opponent + " Ballpark",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": recap.home ? "Arlington" : "",
          "addressRegion": recap.home ? "TX" : "",
          "addressCountry": "US"
        }
      },
      "organizer": {
        "@type": "Organization",
        "name": "Major League Baseball",
        "url": "https://www.mlb.com"
      },
      "homeTeam": {
        "@type": "SportsTeam",
        "name": homeTeam,
        "sport": "Baseball"
      },
      "awayTeam": {
        "@type": "SportsTeam",
        "name": awayTeam,
        "sport": "Baseball"
      },
      "description": recap.score + ' — ' + recap.preview
    },
    "keywords": [
      "Texas Rangers recap",
      matchupTitle + " recap",
      "Rangers " + recap.date,
      "Rangers vs " + recap.opponent,
      recap.opponent + " vs Rangers",
      "Rangers 2026",
      "Rangers box score",
      "AL West"
    ]
  };

  document.getElementById('jsonld-schema').textContent = JSON.stringify(schema, null, 2);
}

// ── Meta tag updater ──────────────────────────────────────────────────
function updateMeta(recap, matchupTitle, isoDate){
  // Title: keyword-rich, under 60 chars when possible
  document.title = matchupTitle + ' Recap (' + recap.score + ') — The Baseball Nerd';

  const metaDesc = 'Rangers recap ' + recap.date + ': ' + recap.score +
    '. ' + recap.preview.slice(0, 130).replace(/\.$/, '') +
    '. Analytics-first coverage on The Baseball Nerd.';

  document.querySelector('meta[name="description"]').setAttribute('content', metaDesc);
  document.querySelector('meta[property="og:title"]').setAttribute('content',
    matchupTitle + ' Recap — ' + recap.score + ' | The Baseball Nerd');
  document.querySelector('meta[property="og:description"]').setAttribute('content',
    recap.preview.slice(0, 200));
  document.querySelector('link[rel="canonical"]').setAttribute('href',
    'https://thebaseballnerd.com/recap.html?id=' + recap.id);

  // Article published date for Google
  const existingDate = document.querySelector('meta[property="article:published_time"]');
  if(!existingDate && isoDate){
    const m = document.createElement('meta');
    m.setAttribute('property','article:published_time');
    m.setAttribute('content', isoDate + 'T12:00:00-05:00');
    document.head.appendChild(m);
  }
}

// ── Render ────────────────────────────────────────────────────────────
function render(){
  const id = getParam('id');
  const recap = RECAPS.find(r => r.id === id);
  const wrap = document.getElementById('article-wrap');

  if(!recap){
    wrap.innerHTML = '<div class="not-found">Recap not found. <a href="recaps.html" style="color:var(--gold);">Back to recaps →</a></div>';
    return;
  }

  const matchupTitle = recap.home
    ? recap.opponent + ' vs Rangers'
    : 'Rangers vs ' + recap.opponent;

  const isoDate = idToISODate(recap.id);

  updateMeta(recap, matchupTitle, isoDate);
  injectStructuredData(recap, matchupTitle, isoDate);

  // Body — gracefully handle empty body
  const bodyContent = recap.body && recap.body.trim()
    ? recap.body.trim().split('\n\n').map(p => '<p>' + p + '</p>').join('')
    : '<p>' + recap.preview + '</p><p><em>Full recap coming soon.</em></p>';

  // Find prev/next for navigation
  const idx = RECAPS.findIndex(r => r.id === id);
  const prev = RECAPS[idx + 1]; // older
  const next = RECAPS[idx - 1]; // newer

  const navLinks = [
    prev ? `<a href="recap.html?id=${prev.id}" style="margin-right:auto;">← ${prev.opponent} (${prev.date})</a>` : '<span></span>',
    `<a href="recaps.html" style="opacity:0.45;">All Recaps</a>`,
    next ? `<a href="recap.html?id=${next.id}" style="margin-left:auto;">${next.opponent} (${next.date}) →</a>` : '<span></span>'
  ].join('');

  // MLB Stories embed — only when gamePk exists and body is written
  const mlbEmbed = (recap.gamePk && recap.body && recap.body.trim())
    ? `<div class="mlb-embed-wrap">
        <div class="mlb-embed-label">
          <span>// Game Highlights · MLB Stories</span>
          <a href="https://www.mlb.com/stories/game/${recap.gamePk}" target="_blank" rel="noopener">View on MLB.com →</a>
        </div>
        <iframe
          class="mlb-embed-frame"
          src="https://www.mlb.com/stories/game/${recap.gamePk}?storylocal=gameday-postgame-wrap-game-embed"
          title="${matchupTitle} highlights"
          loading="lazy"
          sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>
      </div>`
    : '';

  wrap.innerHTML = `
    <a class="back-link" href="recaps.html">← All recaps</a>
    <div class="article-eyebrow">Rangers Recap · 2026 Season</div>
    <h1 class="article-title">${matchupTitle}</h1>
    <div class="article-meta">
      <div class="meta-item"><time datetime="${isoDate || ''}">${recap.date}</time></div>
      <div class="meta-result ${recap.result}">${recap.result === 'win' ? 'W' : 'L'} · ${recap.score}</div>
      <div class="meta-item">Record: ${recap.record}</div>
    </div>
    <article class="article-body" itemscope itemtype="https://schema.org/Article">
      <meta itemprop="headline" content="${matchupTitle} Recap — ${recap.date}">
      <meta itemprop="datePublished" content="${isoDate || ''}">
      <meta itemprop="author" content="Pete Dwyer">
      ${bodyContent}
    </article>
    ${mlbEmbed}
    <div class="article-nav" style="justify-content:space-between;gap:1rem;flex-wrap:wrap;">${navLinks}</div>`;
}

render();
</script>

ined for four scoreless innings, allowing just two hits. But offensive support never materialized. Texas left seven men on base and went 0-for-4 with runners in scoring position, numbers that reflect an attack that never found its rhythm against Cincinnati's staff."

e that deserved a better outcome. The Rangers improved their early-season record while learning that comfortable leads require constant vigilance."

function getParam(name){return new URLSearchParams(window.location.search).get(name);}

function render(){
  const id=getParam('id');
  const recap=RECAPS.find(r=>r.id===id);
  const wrap=document.getElementById('article-wrap');
  if(!recap){
    wrap.innerHTML='<div class="not-found">Recap not found. <a href="recaps.html" style="color:var(--gold);">Back to recaps →</a></div>';
    return;
  }
  // Update title and meta for SEO on each specific recap
  const vsAt = recap.home ? 'vs' : 'at';
  document.title = recap.date + ' Rangers ' + vsAt + ' ' + recap.opponent + ' Recap — The Baseball Nerd';
  const metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content',
    'Rangers ' + vsAt + ' ' + recap.opponent + ' ' + recap.date + ': ' + recap.score +
    ' — ' + recap.preview.slice(0,120) + ' Full analytics and box score breakdown on The Baseball Nerd.'
  );
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if(ogTitle) ogTitle.setAttribute('content', 'Rangers ' + vsAt + ' ' + recap.opponent + ' — ' + recap.score);
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if(ogDesc) ogDesc.setAttribute('content', recap.preview.slice(0,200));
  const canonical = document.querySelector('link[rel="canonical"]');
  if(canonical) canonical.setAttribute('href', 'https://thebaseballnerd.com/recap.html?id=' + recap.id);
  const paragraphs=recap.body.split('\n\n').map(p=>'<p>'+p+'</p>').join('');
  wrap.innerHTML=`
    <a class="back-link" href="recaps.html">← All recaps</a>
    <div class="article-eyebrow">Rangers Recap</div>
    <div class="article-title">Rangers ${recap.home?'vs':'at'} ${recap.opponent}</div>
    <div class="article-meta">
      <div class="meta-item">${recap.date}</div>
      <div class="meta-result ${recap.result}">${recap.result==='win'?'W':'L'} · ${recap.score}</div>
      <div class="meta-item">Record: ${recap.record}</div>
    </div>
    <div class="article-body">${paragraphs}</div>
    <div class="article-nav"><a href="recaps.html">← Back to all recaps</a></div>`;
}

render();
</script>

  var wrap = document.getElementById('article-wrap');
  if (!wrap) return;

  if (!snap) {
    // No match: show not-found. noindex already written in <head>.
    wrap.innerHTML = '<div class="not-found">Recap not found. <a href="recaps.html" style="color:var(--gold);">Back to recaps \u2192<\/a><\/div>';
    return;
  }

  function idToISO(id) {
    var p = id ? id.split('-') : [];
    if (p.length < 3) return '';
    return '20' + p[2] + '-' + p[0].padStart(2,'0') + '-' + p[1].padStart(2,'0');
  }

  var matchup = snap.home ? snap.opp + ' vs Rangers' : 'Rangers vs ' + snap.opp;
  var iso     = idToISO(snap.id);
  var wl      = snap.result === 'win' ? 'W' : 'L';

  // Render the article shell with the lede sentence visible immediately.
  // The .prerender-body div will be replaced by the full body once
  // recaps-data.js loads (Step 2 below).
  wrap.innerHTML =
    '<a class="back-link" href="recaps.html">\u2190 All recaps<\/a>' +
    '<div class="article-eyebrow">Rangers Recap \u00b7 2026 Season<\/div>' +
    '<h1 class="article-title" id="pre-title">' + matchup + '<\/h1>' +
    '<div class="article-meta">' +
      '<div class="meta-item"><time datetime="' + iso + '">' + snap.date + '<\/time><\/div>' +
      '<div class="meta-result ' + snap.result + '">' + wl + ' \u00b7 ' + snap.score + '<\/div>' +
    '<\/div>' +
    '<div id="prerender-body" class="prerender-body">' +
      '<p>' + snap.preview + '<\/p>' +
      '<p class="prerender-loading">Loading full recap\u2026<\/p>' +
    '<\/div>';
})();
</script>

<!-- ── Step 2: Full data + render ────────────────────────────────────
     recaps-data.js loads after the pre-render shell is already
     visible in the DOM. Once it's parsed, the full render replaces
     the pre-render shell with complete body text, nav links, record,
     MLB embed, and JSON-LD schema.
  ───────────────────────────────────────────────────────────────── -->
<script src="recaps-data.js"></script>
<script>
(function(){
  // ── Helpers ─────────────────────────────────────────────────────
  function getParam(n){ return new URLSearchParams(window.location.search).get(n); }

  function idToISODate(id){
    var parts = id ? id.split('-') : [];
    if(parts.length < 3) return null;
    return '20'+parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
  }

  // ── Structured Data ──────────────────────────────────────────────
  function injectStructuredData(recap, matchupTitle, isoDate){
    var homeTeam = recap.home ? 'Texas Rangers' : recap.opponent;
    var awayTeam = recap.home ? recap.opponent  : 'Texas Rangers';
    var schema = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": matchupTitle + ' Recap \u2014 ' + recap.date,
      "description": recap.preview,
      "datePublished": isoDate || new Date().toISOString().split('T')[0],
      "dateModified":  isoDate || new Date().toISOString().split('T')[0],
      "author": {
        "@type": "Person",
        "name": "Pete Dwyer",
        "url": "https://thebaseballnerd.com/about.html"
      },
      "publisher": {
        "@type": "Organization",
        "name": "The Baseball Nerd",
        "url": "https://thebaseballnerd.com",
        "logo": { "@type": "ImageObject", "url": "https://thebaseballnerd.com/favicon.png" }
      },
      "url": "https://thebaseballnerd.com/recap.html?id=" + recap.id,
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://thebaseballnerd.com/recap.html?id=" + recap.id
      },
      "about": {
        "@type": "SportsEvent",
        "name": matchupTitle,
        "startDate": isoDate,
        "endDate":   isoDate,
        "eventStatus": "https://schema.org/EventScheduled",
        "sport": "Baseball",
        "location": {
          "@type": "Place",
          "name": recap.home ? "Globe Life Field" : recap.opponent + " Ballpark",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": recap.home ? "Arlington" : "",
            "addressRegion":   recap.home ? "TX" : "",
            "addressCountry":  "US"
          }
        },
        "organizer": { "@type": "Organization", "name": "Major League Baseball", "url": "https://www.mlb.com" },
        "homeTeam": { "@type": "SportsTeam", "name": homeTeam, "sport": "Baseball" },
        "awayTeam": { "@type": "SportsTeam", "name": awayTeam, "sport": "Baseball" },
        "description": recap.score + ' \u2014 ' + recap.preview
      },
      "keywords": [
        "Texas Rangers recap",
        matchupTitle + " recap",
        "Rangers " + recap.date,
        "Rangers vs " + recap.opponent,
        recap.opponent + " vs Rangers",
        "Rangers 2026",
        "Rangers box score",
        "AL West"
      ]
    };
    document.getElementById('jsonld-schema').textContent = JSON.stringify(schema, null, 2);
  }

  // ── Meta updater (fills in any tags the pre-render didn't write) ──
  function updateMeta(recap, matchupTitle, isoDate){
    document.title = matchupTitle + ' Recap (' + recap.score + ') \u2014 The Baseball Nerd';
    var desc = 'Rangers recap ' + recap.date + ': ' + recap.score +
      '. ' + recap.preview.slice(0,130).replace(/\.$/, '') +
      '. Analytics-first coverage on The Baseball Nerd.';
    document.querySelector('meta[name="description"]').setAttribute('content', desc);
    document.querySelector('meta[property="og:title"]').setAttribute('content',
      matchupTitle + ' Recap \u2014 ' + recap.score + ' | The Baseball Nerd');
    document.querySelector('meta[property="og:description"]').setAttribute('content',
      recap.preview.slice(0,200));
    document.querySelector('link[rel="canonical"]').setAttribute('href',
      'https://thebaseballnerd.com/recap.html?id=' + recap.id);
  }

  // ── Full render ──────────────────────────────────────────────────
  function render(){
    var id   = getParam('id');
    var recap = (typeof RECAPS !== 'undefined') ? RECAPS.find(function(r){ return r.id === id; }) : null;
    var wrap  = document.getElementById('article-wrap');

    // If recaps-data.js failed to load or id not found
    if (!recap) {
      // Only overwrite the DOM if the pre-render didn't already show something.
      // If __RECAP_SNAP__ existed but RECAPS doesn't have it (data mismatch),
      // replace the loading placeholder with a graceful message.
      var preBody = document.getElementById('prerender-body');
      if (preBody) {
        preBody.innerHTML = '<p style="opacity:0.5;font-family:\'IBM Plex Mono\',monospace;font-size:0.7rem;letter-spacing:0.08em;">Full recap unavailable. <a href="recaps.html" style="color:var(--gold);">Back to recaps \u2192<\/a><\/p>';
      } else if (wrap && !window.__RECAP_SNAP__) {
        // Totally unknown id — no pre-render ran at all
        wrap.innerHTML = '<div class="not-found">Recap not found. <a href="recaps.html" style="color:var(--gold);">Back to recaps \u2192<\/a><\/div>';
      }
      return;
    }

    var matchupTitle = recap.home
      ? recap.opponent + ' vs Rangers'
      : 'Rangers vs ' + recap.opponent;

    var isoDate = idToISODate(recap.id);

    updateMeta(recap, matchupTitle, isoDate);
    injectStructuredData(recap, matchupTitle, isoDate);

    // Body text
    var bodyContent = (recap.body && recap.body.trim())
      ? recap.body.trim().split('\n\n').map(function(p){ return '<p>' + p + '<\/p>'; }).join('')
      : '<p>' + recap.preview + '<\/p><p><em>Full recap coming soon.<\/em><\/p>';

    // Prev/next nav
    var idx  = RECAPS.findIndex(function(r){ return r.id === id; });
    var prev = RECAPS[idx + 1];
    var next = RECAPS[idx - 1];

    var navLinks = [
      prev ? '<a href="recap.html?id=' + prev.id + '" style="margin-right:auto;">\u2190 ' + prev.opponent + ' (' + prev.date + ')<\/a>' : '<span><\/span>',
      '<a href="recaps.html" style="opacity:0.45;">All Recaps<\/a>',
      next ? '<a href="recap.html?id=' + next.id + '" style="margin-left:auto;">' + next.opponent + ' (' + next.date + ') \u2192<\/a>' : '<span><\/span>'
    ].join('');

    // MLB embed
    var mlbEmbed = (recap.gamePk && recap.body && recap.body.trim())
      ? '<div class="mlb-embed-wrap">' +
          '<div class="mlb-embed-label">' +
            '<span>// Game Highlights \u00b7 MLB Stories<\/span>' +
            '<a href="https://www.mlb.com/stories/game/' + recap.gamePk + '" target="_blank" rel="noopener">View on MLB.com \u2192<\/a>' +
          '<\/div>' +
          '<iframe class="mlb-embed-frame"' +
            ' src="https://www.mlb.com/stories/game/' + recap.gamePk + '?storylocal=gameday-postgame-wrap-game-embed"' +
            ' title="' + matchupTitle + ' highlights"' +
            ' loading="lazy"' +
            ' sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"><\/iframe>' +
        '<\/div>'
      : '';

    // Replace the entire article-wrap with the full render.
    // Because the pre-render shell is already visible, this swap is
    // imperceptible to human visitors but ensures the full body text
    // is in the DOM for JS-executing crawlers too.
    wrap.innerHTML =
      '<a class="back-link" href="recaps.html">\u2190 All recaps<\/a>' +
      '<div class="article-eyebrow">Rangers Recap \u00b7 2026 Season<\/div>' +
      '<h1 class="article-title">' + matchupTitle + '<\/h1>' +
      '<div class="article-meta">' +
        '<div class="meta-item"><time datetime="' + (isoDate||'') + '">' + recap.date + '<\/time><\/div>' +
        '<div class="meta-result ' + recap.result + '">' + (recap.result === 'win' ? 'W' : 'L') + ' \u00b7 ' + recap.score + '<\/div>' +
        '<div class="meta-item">Record: ' + recap.record + '<\/div>' +
      '<\/div>' +
      '<article class="article-body" itemscope itemtype="https://schema.org/Article">' +
        '<meta itemprop="headline" content="' + matchupTitle + ' Recap \u2014 ' + recap.date + '">' +
        '<meta itemprop="datePublished" content="' + (isoDate||'') + '">' +
        '<meta itemprop="author" content="Pete Dwyer">' +
        bodyContent +
      '<\/article>' +
      mlbEmbed +
      '<div class="article-nav" style="justify-content:space-between;gap:1rem;flex-wrap:wrap;">' + navLinks + '<\/div>';
  }

  render();
})();
</script>
</body>
</html>
